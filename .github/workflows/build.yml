name: Build HMS Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v1.0.2)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── Checkout all three repos ──────────────────────────────────────────

      - name: Checkout installer repo
        uses: actions/checkout@v6
        with:
          path: installer-repo

      - name: Checkout backend
        uses: actions/checkout@v6
        with:
          repository: Vyaptek/hospital_management_backend
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: backend-src

      - name: Checkout frontend
        uses: actions/checkout@v6
        with:
          repository: Vyaptek/hms_webapp
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: frontend-src

      - name: Resolve version
        id: ver
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}"
          }
          Write-Host "Version: $v"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "VERSION=$v"

      # ── Build frontend dist ───────────────────────────────────────────────

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          # Dynamically locate the folder containing package.json
          $targetDir = (Get-ChildItem -Path "frontend-src" -Filter "package.json" -Recurse).DirectoryName
          Write-Host "Navigating to: $targetDir"
          Set-Location $targetDir
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: /api

      # ── Build backend JAR ─────────────────────────────────────────────────

      - name: Set up Java 17 (build only)
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build backend JAR
        working-directory: backend-src
        run: ./gradlew bootJar --no-daemon

      # ── Download large binaries from binaries-stable release ─────────────

      - name: Download bundled binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download binaries-stable --dir deps `
            --repo ${{ github.repository }}

      # ── Assemble staging directory ────────────────────────────────────────

      - name: Assemble staging
        run: |
          $stage = "installer-repo"

          New-Item -ItemType Directory -Force $stage | Out-Null

          # Large binaries — now land next to hms.iss
          Copy-Item deps\java.msi $stage\
          Copy-Item deps\pg.exe   $stage\

          # Backend JAR
          $jar = Get-ChildItem backend-src\build\libs\*.jar `
                   | Where-Object { $_.Name -notlike "*plain*" } `
                   | Select-Object -First 1
          New-Item -ItemType Directory -Force "$stage\backend" | Out-Null
          Copy-Item $jar.FullName "$stage\backend\hms.jar"

          # Frontend dist — use same discovery logic as the build step
          $frontendDir = (Get-ChildItem -Path "frontend-src" -Filter "package.json" `
                           -Recurse | Where-Object { $_.DirectoryName -notlike "*node_modules*" } `
                           | Select-Object -First 1).DirectoryName
          New-Item -ItemType Directory -Force "$stage\frontend" | Out-Null
          Copy-Item "$frontendDir\dist\*" "$stage\frontend\" -Recurse

      # ── Compile installer ─────────────────────────────────────────────────

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        run: |
          # Dynamically locate the exact path to hms.iss
          $issFile = (Get-ChildItem -Path "installer-repo" -Filter "hms.iss" -Recurse).FullName
          Write-Host "Found Inno Setup script at: $issFile"

          # Run the compiler using the discovered path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.ver.outputs.VERSION }}" `
            /O"output" `
            "$issFile"

      # ── Publish to GitHub Releases ────────────────────────────────────────

      - name: Upload installer to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          name: "Vyaptek HMS ${{ steps.ver.outputs.VERSION }}"
          files: output\HMSSetup.exe
